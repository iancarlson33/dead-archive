<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dead Archive — Grateful Dead Live Recordings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --indigo:  #1B0D38;
  --violet:  #2E1A5E;
  --purple:  #3D2475;
  --gold:    #D4A017;
  --gold-dk: #9A7310;
  --orange:  #E8621A;
  --green:   #8DB84A;
  --rose:    #C4246E;
  --cream:   #F2EAD3;
  --warm:    #C8B99A;
  --muted:   #8A7A6A;
  --rule:    rgba(212,160,23,0.2);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
body{background:var(--indigo);color:var(--cream);font-family:'Inter',sans-serif;font-size:16px;line-height:1.5;min-height:100vh;overflow-x:hidden;padding-bottom:230px}
.skip-link{position:absolute;top:-100%;left:16px;background:var(--gold);color:var(--indigo);font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;padding:8px 16px;z-index:9999;text-decoration:none}
.skip-link:focus{top:8px}

/* HEADER */
.site-header{background:var(--indigo);border-bottom:3px solid var(--gold);padding:0 16px;position:sticky;top:0;z-index:200}
.header-top{display:flex;align-items:center;gap:12px;padding:12px 0 8px;border-bottom:1px solid var(--rule)}
.site-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--cream);line-height:1}
.site-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-left:auto}
.header-actions{display:flex;align-items:center;gap:6px}
.icon-btn{background:none;border:1px solid var(--rule);color:var(--warm);cursor:pointer;font-size:14px;padding:6px 10px;font-family:'IBM Plex Mono',monospace;transition:all 0.15s;border-radius:0;white-space:nowrap}
.icon-btn:hover{border-color:var(--gold);color:var(--gold)}
.search-row{display:flex;padding:8px 0;gap:0}
.search-input{flex:1;background:var(--violet);border:2px solid var(--rule);border-right:none;color:var(--cream);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:9px 12px;outline:none;transition:border-color 0.15s;-webkit-appearance:none;border-radius:0}
.search-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,160,23,0.2)}
.search-input::placeholder{color:var(--muted)}
.search-btn{background:var(--gold);border:2px solid var(--gold);color:var(--indigo);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:2px;padding:9px 14px;text-transform:uppercase;border-radius:0;transition:background 0.15s;min-height:44px}
.search-btn:hover{background:var(--cream);border-color:var(--cream)}

/* NAV TABS */
.nav-tabs{display:flex;border-bottom:1px solid var(--rule);background:var(--indigo);padding:0 16px;gap:0;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:1px;color:var(--muted);cursor:pointer;padding:10px 14px;border:none;background:none;border-bottom:2px solid transparent;text-transform:uppercase;white-space:nowrap;transition:color 0.15s;margin-bottom:-1px}
.nav-tab:hover{color:var(--warm)}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* BREADCRUMB */
.breadcrumb{display:none;align-items:center;flex-wrap:wrap;gap:6px;padding:8px 16px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--warm);border-bottom:1px solid var(--rule);background:var(--violet)}
.breadcrumb.visible{display:flex}
.bc-link{color:var(--gold);cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.bc-link:hover{color:var(--cream)}
.bc-sep{color:var(--muted)}

/* SECTION LABEL */
.section-label{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:3px;color:var(--gold);text-transform:uppercase;padding:16px 16px 10px;border-bottom:1px solid var(--rule)}

/* FILTER BAR */
.filter-bar{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--rule);flex-wrap:wrap;background:var(--indigo)}
.filter-chip{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:4px 10px;border:1.5px solid var(--rule);background:none;color:var(--warm);cursor:pointer;transition:all 0.15s;border-radius:0;letter-spacing:0.5px}
.filter-chip:hover{border-color:var(--gold);color:var(--gold)}
.filter-chip.active{background:var(--gold);color:var(--indigo);border-color:var(--gold)}

/* YEAR ALMANAC */
.year-almanac{padding:0 16px}
.year-row{display:flex;align-items:center;border-bottom:1px solid var(--rule);cursor:pointer;transition:background 0.1s;width:100%;background:none;border-left:none;border-right:none;border-top:none;text-align:left;padding:0;min-height:60px}
.year-row:hover{background:var(--violet)}
.year-num{font-family:'Playfair Display',serif;font-size:30px;font-weight:900;color:var(--cream);width:88px;flex-shrink:0;padding:14px 0;line-height:1}
.year-num.has-release{color:var(--gold)}
.year-bar-wrap{flex:1;padding:0 14px}
.year-bar-bg{height:4px;background:var(--purple);border-radius:2px;overflow:hidden}
.year-bar-fill{height:100%;background:var(--gold);border-radius:2px;min-width:4px}
.year-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--warm);text-align:right;width:84px;flex-shrink:0;padding:14px 0;line-height:1.5}
.year-release-label{font-size:9px;color:var(--gold);display:block}

/* SHOW LIST */
.show-list{padding:0 16px}
.show-row{display:flex;align-items:flex-start;border-bottom:1px solid var(--rule);cursor:pointer;transition:background 0.1s;padding:12px 0;width:100%;background:none;border-left:none;border-right:none;border-top:none;text-align:left;color:inherit;gap:0;min-height:44px}
.show-row:hover,.show-row.active{background:var(--violet);margin:0 -16px;padding:12px 16px}
.show-date-col{flex-shrink:0;width:64px;padding-right:12px;border-right:1px solid var(--rule);margin-right:12px}
.show-day-num{font-family:'Playfair Display',serif;font-size:40px;font-weight:900;color:var(--cream);line-height:1}
.show-month-label{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.show-info-col{flex:1;min-width:0}
.show-venue-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--cream);line-height:1.2}
.show-location{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--warm);margin-top:3px}
.show-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:0.5px;padding:2px 6px;border:1.5px solid currentColor}
.tag-release{color:var(--cream);background:var(--rose);border-color:var(--rose)}
.tag-stars{color:var(--gold);border-color:var(--gold-dk);background:rgba(212,160,23,0.1)}
.tag-sbd{color:var(--green);border-color:var(--green);background:rgba(141,184,74,0.1)}
.tag-reddit{color:var(--orange);border-color:var(--orange);background:rgba(232,98,26,0.1)}
.show-quick-play{flex-shrink:0;align-self:center;margin-left:8px;width:32px;height:32px;background:var(--purple);border:1.5px solid var(--gold-dk);color:var(--gold);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.show-quick-play:hover{background:var(--gold);color:var(--indigo)}
.show-arrow{color:var(--gold);font-size:18px;padding-left:8px;flex-shrink:0;align-self:center;font-family:'IBM Plex Mono',monospace}

/* NOTABLE SHOWS GRID */
.notable-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 16px}
.notable-card{background:var(--violet);border:1px solid var(--rule);padding:12px;cursor:pointer;transition:background 0.15s}
.notable-card:hover{background:var(--purple);border-color:var(--gold)}
.notable-date{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--gold);margin-bottom:4px}
.notable-venue{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--cream);line-height:1.2}
.notable-why{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--warm);margin-top:4px}

/* OFFICIAL RELEASES */
.releases-list{padding:0 16px}
.release-series-header{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:3px;color:var(--rose);text-transform:uppercase;padding:14px 0 8px;border-bottom:1px solid rgba(196,36,110,0.2)}
.release-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--rule);cursor:pointer;transition:background 0.15s;width:100%;background:none;border-left:none;border-right:none;border-top:none;text-align:left;color:inherit}
.release-item:hover{background:var(--violet);margin:0 -16px;padding:10px 16px}
.release-art{width:40px;height:40px;object-fit:cover;flex-shrink:0;border:1px solid var(--rose)}
.release-art-placeholder{width:40px;height:40px;background:var(--purple);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--muted);border:1px solid var(--rule);text-align:center;line-height:1.3}
.release-info-col{flex:1;min-width:0}
.release-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--cream)}
.release-date{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--warm);margin-top:2px}

/* PROGRAM HEADER */
.program-header{background:var(--violet);border-bottom:3px solid var(--gold);padding:16px 16px 20px}
.program-back{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);cursor:pointer;margin-bottom:14px;background:none;border:none;padding:0;text-decoration:underline;text-underline-offset:3px}
.program-back:hover{color:var(--cream)}
.program-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.program-date{font-family:'Playfair Display',serif;font-size:13px;font-style:italic;color:var(--warm);margin-bottom:3px}
.program-venue{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--cream);line-height:1.15;margin-bottom:3px}
.program-location{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--warm);margin-bottom:14px}
.program-rule{height:1px;background:var(--rule);margin-bottom:14px}
.program-meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.meta-label{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:2px}
.meta-value{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--cream);word-break:break-all}
.meta-value a{color:var(--gold);text-decoration:underline;text-underline-offset:3px}
.meta-value.hi{color:var(--green)}
.program-releases{padding-top:14px;border-top:1px solid var(--rule);display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.rel-row{display:flex;align-items:center;gap:10px}
.rel-thumb{width:40px;height:40px;object-fit:cover;flex-shrink:0;border:2px solid var(--rose)}
.rel-name{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--cream)}
.rel-type{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1px;color:var(--rose);text-transform:uppercase;margin-top:1px}
.program-description{padding-top:14px;border-top:1px solid var(--rule);font-size:12px;color:var(--warm);line-height:1.65;font-style:italic;margin-bottom:14px}
.program-reddit{padding-top:14px;border-top:1px solid var(--rule);display:flex;align-items:center;gap:10px}
.reddit-count{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--orange);line-height:1}
.reddit-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--warm)}
.reddit-label span{display:block;color:var(--orange)}

/* RECORDING SWITCHER */
.recording-switcher{background:var(--indigo);border-bottom:1px solid var(--rule);padding:10px 16px}
.switcher-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase}
.switcher-list{display:flex;flex-direction:column;gap:4px}
.switcher-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--violet);border:1px solid var(--rule);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--warm);transition:all 0.1s;width:100%;text-align:left}
.switcher-item:hover{border-color:var(--gold);color:var(--cream)}
.switcher-item.active{border-color:var(--gold);color:var(--gold);background:var(--purple)}
.switcher-source{font-size:10px;padding:1px 5px;border:1px solid currentColor;margin-right:2px}
.switcher-source.sbd{color:var(--green)}
.switcher-source.mtx{color:var(--gold)}
.switcher-source.aud{color:var(--warm)}

/* SETLIST */
.setlist-section{padding:0 16px}
.set-header{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:3px;color:var(--orange);text-transform:uppercase;padding:14px 0 7px;border-bottom:1px solid rgba(232,98,26,0.25)}
.track-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--rule);cursor:pointer;transition:background 0.1s;width:100%;background:none;border-left:none;border-right:none;border-top:none;text-align:left;color:inherit;min-height:44px}
.track-row:hover,.track-row.playing{background:var(--violet);margin:0 -16px;padding:10px 16px}
.track-num{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);width:18px;text-align:right;flex-shrink:0}
.track-body{flex:1;min-width:0}
.track-name{font-family:'Playfair Display',serif;font-size:15px;color:var(--cream);line-height:1.2}
.track-row.playing .track-name{color:var(--gold)}
.track-transition{color:var(--gold-dk);margin:0 3px;font-size:12px}
.track-heady{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--green);margin-top:2px}
.track-cover{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-top:1px;font-style:italic}
.track-dur{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--warm);flex-shrink:0}
.track-play{width:28px;height:28px;background:var(--purple);border:1.5px solid var(--gold-dk);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--gold);flex-shrink:0}

/* MESSAGES */
.msg{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold);padding:28px 16px;letter-spacing:2px}
.error-msg{margin:16px;padding:14px;border:2px solid var(--orange);font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--cream);background:rgba(232,98,26,0.1);line-height:1.6}

/* RECENTLY PLAYED TRAY */
.recent-tray{background:var(--violet);border-top:1px solid var(--rule);padding:10px 16px;display:none}
.recent-tray.visible{display:block}
.recent-tray-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.recent-list{display:flex;flex-direction:column;gap:3px;max-height:120px;overflow-y:auto}
.recent-item{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--warm);cursor:pointer;padding:3px 0;border:none;background:none;text-align:left;transition:color 0.1s}
.recent-item:hover{color:var(--gold)}

/* KEYBOARD SHORTCUTS MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(11,6,24,0.85);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.visible{display:flex}
.modal-box{background:var(--violet);border:2px solid var(--gold);padding:20px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--cream);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;color:var(--warm);cursor:pointer;font-size:20px;line-height:1;padding:0}
.modal-close:hover{color:var(--cream)}
.shortcut-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--rule);font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--warm)}
.shortcut-key{background:var(--purple);border:1px solid var(--rule);padding:2px 8px;font-size:11px;color:var(--cream)}

/* SHARE TOAST */
.share-toast{position:fixed;bottom:240px;left:50%;transform:translateX(-50%);background:var(--green);color:var(--indigo);font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;padding:8px 16px;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.share-toast.show{opacity:1}

/* PLAYER */
.player{position:fixed;bottom:0;left:0;right:0;background:var(--indigo);border-top:3px solid var(--gold);padding:8px 16px 24px;z-index:200}
.viz-row{height:28px;display:flex;align-items:flex-end;gap:2px;margin-bottom:6px}
.viz-bar{flex:1;background:var(--gold);min-height:2px;opacity:0.4;transition:height 0.09s ease}
.player-now{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.player-text{flex:1;min-width:0}
.player-track{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.player-show{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--warm);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;color:var(--indigo);background:var(--rose);padding:2px 6px;flex-shrink:0;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.progress-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.time-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--warm);min-width:32px}
.progress-track{flex:1;height:4px;background:var(--purple);cursor:pointer;border-radius:2px}
.progress-fill{height:100%;background:var(--gold);width:0%;border-radius:2px}
.controls{display:flex;align-items:center;justify-content:center;gap:20px}
.ctrl-btn{background:none;border:none;color:var(--warm);cursor:pointer;font-size:18px;padding:6px;display:flex;align-items:center;justify-content:center;min-width:44px;min-height:44px;border-radius:50%;transition:color 0.1s,background 0.1s}
.ctrl-btn:hover{color:var(--cream);background:var(--violet)}
.play-btn{width:46px;height:46px;background:var(--gold);border:none;color:var(--indigo);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;transition:background 0.1s}
.play-btn:hover{background:var(--cream)}
audio{display:none}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

<header class="site-header" role="banner">
  <div class="header-top">
    <div class="site-title">Dead Archive</div>
    <div class="header-actions">
      <button class="icon-btn" id="shareBtn" aria-label="Share this show" style="display:none">Share</button>
      <button class="icon-btn" id="shortcutsBtn" aria-label="Keyboard shortcuts">Keys</button>
    </div>
    <div class="site-sub" aria-hidden="true">Archive.org</div>
  </div>
  <div class="search-row" role="search">
    <label for="searchInput" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Search shows</label>
    <input class="search-input" id="searchInput" type="search" placeholder="Search venue, city, year…" aria-label="Search shows">
    <button class="search-btn" id="searchBtn" aria-label="Search">Search</button>
  </div>
  <nav class="nav-tabs" aria-label="Browse sections">
    <button class="nav-tab active" data-tab="years" aria-selected="true">Browse</button>
    <button class="nav-tab" data-tab="notable" aria-selected="false">Notable</button>
    <button class="nav-tab" data-tab="releases" aria-selected="false">Releases</button>
  </nav>
</header>

<nav id="breadcrumb" class="breadcrumb" aria-label="Navigation path"></nav>
<main id="main" tabindex="-1"></main>

<div class="recent-tray" id="recentTray" aria-label="Recently played">
  <div class="recent-tray-label">Recently played</div>
  <div class="recent-list" id="recentList"></div>
</div>

<div class="player" id="player" style="display:none" role="region" aria-label="Audio player">
  <div class="viz-row" id="vizRow" aria-hidden="true"></div>
  <div class="player-now">
    <div class="player-text">
      <div class="player-track" id="playerTrack" aria-live="polite">—</div>
      <div class="player-show" id="playerShow">—</div>
    </div>
    <div class="player-badge" id="playerBadge" style="display:none"></div>
  </div>
  <div class="progress-row">

<audio id="audio" crossorigin="anonymous"></audio>

<script>
// ── Data ──
const RELEASES  = {};
const HEADY     = {};
const SETLISTS  = {};
const REDDIT    = {};
const REL_YEARS = new Set();

const MS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const ML = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DEAD_YEARS = Array.from({length:31},(_,i)=>1965+i);
const YEAR_COUNTS = {1965:20,1966:70,1967:90,1968:90,1969:100,1970:150,1971:140,1972:130,1973:140,1974:80,1975:20,1976:60,1977:90,1978:100,1979:90,1980:90,1981:80,1982:80,1983:90,1984:100,1985:100,1986:60,1987:90,1988:90,1989:100,1990:100,1991:100,1992:100,1993:80,1994:80,1995:50};
const MAX_COUNT = Math.max(...Object.values(YEAR_COUNTS));

// Notable shows — hand-curated
const NOTABLE_SHOWS = [
  {date:"1977-05-08",venue:"Barton Hall, Cornell University",location:"Ithaca, NY",why:"Most celebrated recording ever"},
  {date:"1972-08-27",venue:"Old Renaissance Faire Grounds",location:"Veneta, OR",why:"Sunshine Daydream · #1 Dark Star"},
  {date:"1969-02-27",venue:"Fillmore West",location:"San Francisco, CA",why:"Live/Dead recording session"},
  {date:"1974-09-18",venue:"Alexandra Palace",location:"London, England",why:"Final Wall of Sound show"},
  {date:"1973-02-09",venue:"Maples Pavilion",location:"Stanford, CA",why:"Peak Europe-era sound"},
  {date:"1971-10-31",venue:"Ohio Theatre",location:"Columbus, OH",why:"Halloween '71 · Dick's Picks Vol. 2"},
  {date:"1977-05-19",venue:"Fox Theatre",location:"Atlanta, GA",why:"Dick's Picks Vol. 29"},
  {date:"1978-09-15",venue:"Sound and Light Theater",location:"Giza, Egypt",why:"Egypt '78 · pyramids concert"},
  {date:"1970-02-13",venue:"Fillmore East",location:"New York, NY",why:"Dick's Picks Vol. 4"},
  {date:"1989-10-16",venue:"Meadowlands Arena",location:"East Rutherford, NJ",why:"Nightfall of Diamonds"},
  {date:"1975-08-13",venue:"Great American Music Hall",location:"San Francisco, CA",why:"One from the Vault · first show in 2 years"},
  {date:"1990-10-31",venue:"Coliseum",location:"Oakland, CA",why:"Halloween '90 · Dave's Picks Vol. 13"},
];

// ── Helpers ──
function isoDate(raw){const m=(raw||"").match(/^(\d{4}-\d{2}-\d{2})/);return m?m[1]:null}
function getReleases(d){return d?(RELEASES[d]||[]):[]}
function getHeady(d){return d?(HEADY[d]||[]):[]}
function getSetlist(d){return d?(SETLISTS[d]||null):null}
function getReddit(d){return d?(REDDIT[d]||null):null}
function fmtTime(s){if(!s||isNaN(s))return"0:00";return Math.floor(s/60)+":"+String(Math.floor(s%60)).padStart(2,"0")}

function cleanName(n){
  return n.replace(/\.(mp3|ogg|flac|shn)$/i,"")
    .replace(/^gd\d{2}-\d{2}-\d{2}[a-z]?\d*[.\-]*/i,"")
    .replace(/^d\d+t\d+[.\-]*/i,"")
    .replace(/[-_]/g," ").replace(/\s+/g," ").trim()
    .replace(/\b\w/g,c=>c.toUpperCase())||n;
}

function trackOrder(f){
  if(f.track){const m=String(f.track).match(/(\d+)/);if(m){const d=f.name.match(/[Dd](\d+)[Tt]\d+/);return(d?parseInt(d[1])*1000:0)+parseInt(m[1]);}}
  const dn=f.name.toLowerCase();
  const dt=dn.match(/d(\d+)t(\d+)/);if(dt)return parseInt(dt[1])*1000+parseInt(dt[2]);
  const t=dn.match(/(?:^|[^\d])(\d{2,3})(?:[^\d]|$)/);if(t)return parseInt(t[1]);
  return 9999;
}

function displayName(f){
  const title=(f.title||"").trim();
  if(title&&!/^(d\d+t\d+|track\s*\d+|t\d+)$/i.test(title)&&title.length>2)return title;
  return cleanName(f.name);
}

function parseSource(id){
  const s=(id||"").toLowerCase();
  if(s.includes(".sbd.")||s.includes("sbd"))return"sbd";
  if(s.includes(".mtx.")||s.includes("mtx"))return"mtx";
  if(s.includes(".aud.")||s.includes("aud"))return"aud";
  return"rec";
}

function sourceLabel(src){
  return{sbd:"Soundboard",mtx:"Matrix",aud:"Audience",rec:"Recording"}[src]||"Recording";
}

function calcRuntime(files){
  let total=0;
  files.filter(f=>f.name.toLowerCase().endsWith(".mp3")&&!f.name.toLowerCase().includes("_vbr")).forEach(f=>{
    if(f.length){const p=String(f.length).split(":");if(p.length===2)total+=parseInt(p[0])*60+parseFloat(p[1]);else total+=parseFloat(f.length);}
  });
  if(!total)return null;
  const h=Math.floor(total/3600),m=Math.floor((total%3600)/60);
  return h>0?h+"h "+m+"m":m+"m";
}

// ── DOM refs ──
const mainEl        = document.getElementById("main");
const breadcrumb    = document.getElementById("breadcrumb");
const playerEl      = document.getElementById("player");
const playBtn       = document.getElementById("playBtn");
const prevBtn       = document.getElementById("prevBtn");
const nextBtn       = document.getElementById("nextBtn");
const progressFill  = document.getElementById("progressFill");
const progressTrack = document.getElementById("progressTrack");
const timeElapsed   = document.getElementById("timeElapsed");
const timeDuration  = document.getElementById("timeDuration");
const playerTrack   = document.getElementById("playerTrack");
const playerShow    = document.getElementById("playerShow");
const playerBadge   = document.getElementById("playerBadge");
const audio         = document.getElementById("audio");
const vizRow        = document.getElementById("vizRow");
const recentTray    = document.getElementById("recentTray");
const recentList    = document.getElementById("recentList");
const shareBtn      = document.getElementById("shareBtn");
const shareToast    = document.getElementById("shareToast");

// ── Visualizer ──
const vizBars = Array.from({length:40},()=>{
  const b=document.createElement("div");b.className="viz-bar";b.style.height="2px";
  vizRow.appendChild(b);return b;
});
let vizPlaying=false;
setInterval(()=>vizBars.forEach(b=>{
  b.style.height=(vizPlaying?2+Math.random()*26:2)+"px";
  b.style.opacity=vizPlaying?"0.65":"0.2";
}),100);

// ── State ──
let shows=[], activeShow=null, activeIdentifier=null, altRecordings=[], tracks=[], currentIdx=-1;
let currentTab="years", currentYear=null, sourceFilter="all";
let recentShows = JSON.parse(localStorage.getItem("da_recent")||"[]");

// ── Recently played ──
function saveRecent(doc){
  recentShows = recentShows.filter(r=>r.identifier!==doc.identifier);
  recentShows.unshift({identifier:doc.identifier,venue:doc.venue||doc.title||"",date:doc.date||""});
  if(recentShows.length>10)recentShows=recentShows.slice(0,10);
  localStorage.setItem("da_recent",JSON.stringify(recentShows));
  renderRecentTray();
}

function renderRecentTray(){
  if(!recentShows.length){recentTray.classList.remove("visible");return;}
  recentTray.classList.add("visible");
  recentList.innerHTML="";
  recentShows.forEach(r=>{
    const btn=document.createElement("button");
    btn.className="recent-item";
    const parts=(r.date||"").split("-");
    const dateStr=parts.length===3?`${MS[parseInt(parts[1])-1]} ${parseInt(parts[2])}, ${parts[0]}`:"";
    btn.textContent=`${dateStr} · ${r.venue}`;
    btn.addEventListener("click",()=>{
      // Find in shows array or do a quick fetch
      const found=shows.find(s=>s.identifier===r.identifier);
      if(found){loadShow(shows.indexOf(found));}
      else{loadShowByIdentifier(r);}
    });
    recentList.appendChild(btn);
  });
}

async function loadShowByIdentifier(r){
  activeShow={identifier:r.identifier,venue:r.venue,date:r.date,coverage:""};
  activeIdentifier=r.identifier;
  document.getElementById("programHeader")?.remove();
  document.getElementById("setlistBlock")?.remove();
  document.getElementById("recordingSwitcher")?.remove();
  renderProgramHeader(activeShow,null);
  const loading=document.createElement("div");loading.className="msg";loading.id="setlistLoading";loading.textContent="Loading…";mainEl.appendChild(loading);
  try{
    const r2=await fetch("https://archive.org/metadata/"+r.identifier);
    const meta=await r2.json();
    const runtime=calcRuntime(meta.files||[]);
    renderProgramHeader(activeShow,{meta,runtime});
    let mp3s=(meta.files||[]).filter(f=>{const n=f.name.toLowerCase();return n.endsWith(".mp3")&&!n.includes("_vbr")&&!n.includes("_sample");});
    if(!mp3s.length)mp3s=(meta.files||[]).filter(f=>f.name.toLowerCase().endsWith(".ogg")&&!f.name.toLowerCase().includes("_vbr"));
    mp3s.sort((a,b)=>trackOrder(a)-trackOrder(b));
    document.getElementById("setlistLoading")?.remove();
    tracks=mp3s.map(f=>({name:displayName(f),url:"https://archive.org/download/"+r.identifier+"/"+encodeURIComponent(f.name),duration:f.length||""}));
    renderSetlist(activeShow);
  }catch{document.getElementById("setlistLoading")?.remove();}
}

// ── Breadcrumb ──
function setBreadcrumb(parts){
  if(!parts||!parts.length){breadcrumb.classList.remove("visible");breadcrumb.innerHTML="";return;}
  breadcrumb.classList.add("visible");
  breadcrumb.innerHTML="";
  const home=document.createElement("button");
  home.className="bc-link";home.textContent="All Years";home.style.cssText="border:none;background:none;cursor:pointer;padding:0;font-family:inherit;font-size:inherit";
  home.addEventListener("click",()=>showYearGrid());breadcrumb.appendChild(home);
  parts.forEach(p=>{
    const sep=document.createElement("span");sep.className="bc-sep";sep.textContent=" › ";breadcrumb.appendChild(sep);
    if(p.onclick){
      const a=document.createElement("button");a.className="bc-link";a.textContent=p.label;
      a.style.cssText="border:none;background:none;cursor:pointer;padding:0;font-family:inherit;font-size:inherit";
      a.addEventListener("click",p.onclick);breadcrumb.appendChild(a);
    } else {
      const s=document.createElement("span");s.textContent=p.label;s.style.color="var(--cream)";breadcrumb.appendChild(s);
    }
  });
}

// ── Tab switching ──
document.querySelectorAll(".nav-tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".nav-tab").forEach(t=>{t.classList.remove("active");t.setAttribute("aria-selected","false");});
    tab.classList.add("active");tab.setAttribute("aria-selected","true");
    currentTab=tab.dataset.tab;
    setBreadcrumb(null);
    document.getElementById("programHeader")?.remove();
    document.getElementById("setlistBlock")?.remove();
    document.getElementById("recordingSwitcher")?.remove();
    shareBtn.style.display="none";
    if(currentTab==="years")showYearGrid();
    else if(currentTab==="notable")showNotable();
    else if(currentTab==="releases")showReleases();
  });
});

// ── YEAR GRID ──
function showYearGrid(){
  currentYear=null;shows=[];
  setBreadcrumb(null);
  document.getElementById("programHeader")?.remove();
  document.getElementById("setlistBlock")?.remove();
  document.getElementById("recordingSwitcher")?.remove();
  shareBtn.style.display="none";

  const frag=document.createDocumentFragment();
  const lbl=document.createElement("div");lbl.className="section-label";lbl.textContent="— Browse by year —";frag.appendChild(lbl);
  const almanac=document.createElement("div");almanac.className="year-almanac";
  DEAD_YEARS.forEach(y=>{
    const hasRel=REL_YEARS.has(String(y));
    const pct=Math.round((YEAR_COUNTS[y]||0)/MAX_COUNT*100);
    const row=document.createElement("button");row.className="year-row";row.setAttribute("type","button");row.setAttribute("aria-label",`Browse shows from ${y}`);
    row.innerHTML=`<div class="year-num${hasRel?" has-release":""}">${y}</div><div class="year-bar-wrap"><div class="year-bar-bg"><div class="year-bar-fill" style="width:${pct}%"></div></div></div><div class="year-meta">${hasRel?`<span class="year-release-label">★ Released</span>`:""}</div>`;
    row.addEventListener("click",()=>loadYear(y));
    almanac.appendChild(row);
  });
  frag.appendChild(almanac);
  mainEl.innerHTML="";mainEl.appendChild(frag);
}

// ── NOTABLE SHOWS ──
function showNotable(){
  setBreadcrumb([{label:"Notable shows"}]);
  mainEl.innerHTML="";
  const lbl=document.createElement("div");lbl.className="section-label";lbl.textContent="— Community picks & landmark shows —";mainEl.appendChild(lbl);
  const grid=document.createElement("div");grid.className="notable-grid";
  NOTABLE_SHOWS.forEach(s=>{
    const card=document.createElement("button");card.className="notable-card";card.setAttribute("type","button");
    card.innerHTML=`<div class="notable-date">${s.date}</div><div class="notable-venue">${s.venue}</div><div class="notable-why">${s.why}</div>`;
    card.addEventListener("click",()=>loadShowByDate(s.date,s.venue,s.location));
    grid.appendChild(card);
  });
  mainEl.appendChild(grid);
}

async function loadShowByDate(date,venue,location){
  mainEl.innerHTML=`<div class="msg">Loading ${date}…</div>`;
  const url=`https://archive.org/advancedsearch.php?q=creator%3A%22Grateful+Dead%22+date%3A${date}&fl[]=identifier,title,date,venue,coverage,avg_rating,description&sort[]=avg_rating+desc&rows=5&page=1&output=json`;
  try{
    const r=await fetch(url);const data=await r.json();
    const docs=data.response?.docs||[];
    if(!docs.length){mainEl.innerHTML=`<div class="error-msg">No recordings found for ${date}.</div>`;return;}
    shows=docs;
    loadShow(0);
  }catch{mainEl.innerHTML=`<div class="error-msg">Could not reach archive.org.</div>`;}
}

// ── OFFICIAL RELEASES ──
function showReleases(){
  setBreadcrumb([{label:"Official releases"}]);
  mainEl.innerHTML="";

  // Group releases by label
  const byLabel={};
  Object.values(RELEASES).forEach(entries=>{
    entries.forEach(e=>{
      if(!byLabel[e.label])byLabel[e.label]=[];
      if(!byLabel[e.label].find(x=>x.title===e.title))byLabel[e.label].push(e);
    });
  });

  // Sort labels
  const labelOrder=["Dick's Picks","Dave's Picks","Road Trips","Download Series","From the Vault","View from the Vault","Venue Release","Europe '72","Egypt '78","Live Album","Official Release"];
  const sortedLabels=Object.keys(byLabel).sort((a,b)=>{
    const ai=labelOrder.indexOf(a),bi=labelOrder.indexOf(b);
    return(ai===-1?99:ai)-(bi===-1?99:bi);
  });

  const lbl=document.createElement("div");lbl.className="section-label";lbl.textContent="— Official live releases by series —";mainEl.appendChild(lbl);
  const list=document.createElement("div");list.className="releases-list";

  sortedLabels.forEach(label=>{
    const hdr=document.createElement("div");hdr.className="release-series-header";hdr.textContent=label;list.appendChild(hdr);
    // Sort by title within series
    const sorted=[...byLabel[label]].sort((a,b)=>a.title.localeCompare(b.title));
    sorted.forEach(rel=>{
      // Find dates for this release
      const relDates=Object.entries(RELEASES).filter(([d,entries])=>entries.some(e=>e.title===rel.title)).map(([d])=>d).sort();
      const dateStr=relDates.length===1?relDates[0]:relDates.length>1?`${relDates[0]} – ${relDates[relDates.length-1]}`:"";

      const item=document.createElement("button");item.className="release-item";item.setAttribute("type","button");
      const artEl=rel.artwork?`<img class="release-art" src="${rel.artwork}" alt="${rel.title}" loading="lazy">`:`<div class="release-art-placeholder">${rel.title.slice(0,8)}</div>`;
      item.innerHTML=`${artEl}<div class="release-info-col"><div class="release-title">${rel.title}</div><div class="release-date">${dateStr}</div></div><span style="color:var(--gold);font-size:18px;margin-left:auto">›</span>`;
      item.addEventListener("click",()=>{
        if(relDates[0])loadShowByDate(relDates[0],rel.title,"");
      });
      list.appendChild(item);
    });
  });
  mainEl.appendChild(list);
}

// ── LOAD YEAR ──
async function loadYear(year){
  currentYear=year;activeShow=null;shows=[];sourceFilter="all";
  document.getElementById("programHeader")?.remove();
  document.getElementById("setlistBlock")?.remove();
  document.getElementById("recordingSwitcher")?.remove();
  shareBtn.style.display="none";
  setBreadcrumb([{label:String(year)}]);
  mainEl.innerHTML=`<div class="msg">Loading ${year}…</div>`;

  const url=`https://archive.org/advancedsearch.php?q=creator%3A%22Grateful+Dead%22+date%3A${year}&fl[]=identifier,title,date,venue,coverage,avg_rating,description&sort[]=date+asc&rows=500&page=1&output=json`;
  try{
    const r=await fetch(url);if(!r.ok)throw new Error();
    const data=await r.json();
    const byDate={};
    (data.response?.docs||[]).forEach(doc=>{
      const d=isoDate(doc.date);if(!d||!d.startsWith(String(year)))return;
      if(!byDate[d]||parseFloat(doc.avg_rating||0)>parseFloat(byDate[d].avg_rating||0))byDate[d]=doc;
    });
    shows=Object.values(byDate).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    if(!shows.length){mainEl.innerHTML=`<div class="error-msg">No recordings found for ${year}.</div>`;return;}
    renderShowList(year);
  }catch{mainEl.innerHTML=`<div class="error-msg">Could not reach archive.org. Check your connection.</div>`;}
}

function getFilteredShows(){
  if(sourceFilter==="all")return shows;
  return shows.filter(doc=>{
    const src=parseSource(doc.identifier);
    if(sourceFilter==="sbd")return src==="sbd";
    if(sourceFilter==="aud")return src==="aud";
    if(sourceFilter==="released")return getReleases(isoDate(doc.date)).length>0;
    return true;
  });
}

function renderShowList(year){
  const frag=document.createDocumentFragment();

  // Filter bar
  const filterBar=document.createElement("div");filterBar.className="filter-bar";filterBar.setAttribute("role","group");filterBar.setAttribute("aria-label","Filter shows");
  [["all","All"],["sbd","Soundboard"],["aud","Audience"],["released","Released"]].forEach(([val,label])=>{
    const chip=document.createElement("button");chip.className="filter-chip"+(sourceFilter===val?" active":"");chip.setAttribute("type","button");chip.setAttribute("aria-pressed",sourceFilter===val?"true":"false");chip.textContent=label;
    chip.addEventListener("click",()=>{sourceFilter=val;renderShowList(year);});
    filterBar.appendChild(chip);
  });
  frag.appendChild(filterBar);

  const filtered=getFilteredShows();
  const lbl=document.createElement("div");lbl.className="section-label";lbl.textContent=`— ${filtered.length} show${filtered.length!==1?"s":""} · ${year} —`;frag.appendChild(lbl);

  const list=document.createElement("div");list.className="show-list";
  filtered.forEach((doc,i)=>{
    const parts=(doc.date||"").split("-");
    const day=parts[2]?parseInt(parts[2]):"?";
    const month=parts[1]?MS[parseInt(parts[1])-1]:"";
    const venue=doc.venue||doc.title||"Unknown Venue";
    const stars=doc.avg_rating?Math.round(parseFloat(doc.avg_rating)):0;
    const releases=getReleases(isoDate(doc.date));
    const src=parseSource(doc.identifier);
    const reddit=getReddit(isoDate(doc.date));
    const origIdx=shows.indexOf(doc);

    const row=document.createElement("button");row.className="show-row";row.setAttribute("type","button");row.dataset.idx=origIdx;
    const dateCol=document.createElement("div");dateCol.className="show-date-col";
    dateCol.innerHTML=`<div class="show-day-num">${day}</div><div class="show-month-label">${month}</div>`;
    const infoCol=document.createElement("div");infoCol.className="show-info-col";
    const venueEl=document.createElement("div");venueEl.className="show-venue-name";venueEl.textContent=venue;
    const locEl=document.createElement("div");locEl.className="show-location";locEl.textContent=doc.coverage||"";
    const tags=document.createElement("div");tags.className="show-tags";
    if(stars){const t=document.createElement("span");t.className="tag tag-stars";t.textContent="★".repeat(Math.min(5,stars));tags.appendChild(t);}
    if(src==="sbd"){const t=document.createElement("span");t.className="tag tag-sbd";t.textContent="SBD";tags.appendChild(t);}
    releases.forEach(rel=>{const t=document.createElement("span");t.className="tag tag-release";t.textContent=rel.title;tags.appendChild(t);});
    if(reddit&&reddit.mentions>2){const t=document.createElement("span");t.className="tag tag-reddit";t.textContent=`r/ ${reddit.mentions}`;tags.appendChild(t);}
    infoCol.appendChild(venueEl);infoCol.appendChild(locEl);if(tags.children.length)infoCol.appendChild(tags);

    // Quick play button (fixes depth-4)
    const qp=document.createElement("button");qp.className="show-quick-play";qp.setAttribute("type","button");qp.setAttribute("aria-label",`Quick play ${venue}`);qp.textContent="▶";
    qp.addEventListener("click",e=>{e.stopPropagation();quickPlayShow(origIdx);});

    const arrow=document.createElement("div");arrow.className="show-arrow";arrow.textContent="›";
    row.appendChild(dateCol);row.appendChild(infoCol);row.appendChild(qp);row.appendChild(arrow);
    row.addEventListener("click",()=>loadShow(origIdx));
    list.appendChild(row);
  });
  frag.appendChild(list);
  mainEl.innerHTML="";mainEl.appendChild(frag);
}

// Quick play — load first track without going into detail view
async function quickPlayShow(idx){
  const doc=shows[idx];if(!doc)return;
  try{
    const r=await fetch("https://archive.org/metadata/"+doc.identifier);
    const meta=await r.json();
    let mp3s=(meta.files||[]).filter(f=>{const n=f.name.toLowerCase();return n.endsWith(".mp3")&&!n.includes("_vbr")&&!n.includes("_sample");});
    mp3s.sort((a,b)=>trackOrder(a)-trackOrder(b));
    if(!mp3s.length)return;
    activeShow=doc;activeIdentifier=doc.identifier;
    tracks=mp3s.map(f=>({name:displayName(f),url:"https://archive.org/download/"+doc.identifier+"/"+encodeURIComponent(f.name),duration:f.length||""}));
    playTrack(0);
    saveRecent(doc);
  }catch{}
}

// ── SEARCH ──
async function doSearch(){
  const q=document.getElementById("searchInput").value.trim();
  if(!q){showYearGrid();return;}
  if(/^\d{4}$/.test(q)&&parseInt(q)>=1965&&parseInt(q)<=1995){await loadYear(parseInt(q));return;}

  activeShow=null;shows=[];sourceFilter="all";
  document.getElementById("programHeader")?.remove();
  document.getElementById("setlistBlock")?.remove();
  document.getElementById("recordingSwitcher")?.remove();
  shareBtn.style.display="none";
  setBreadcrumb([{label:`"${q}"`}]);
  mainEl.innerHTML=`<div class="msg">Searching…</div>`;

  const url=`https://archive.org/advancedsearch.php?q=creator%3A%22Grateful+Dead%22+${encodeURIComponent(q)}&fl[]=identifier,title,date,venue,coverage,avg_rating,description&sort[]=avg_rating+desc&rows=50&page=1&output=json`;
  try{
    const r=await fetch(url);if(!r.ok)throw new Error();
    const data=await r.json();
    const byDate={};
    (data.response?.docs||[]).forEach(doc=>{const d=isoDate(doc.date);if(!d)return;if(!byDate[d]||parseFloat(doc.avg_rating||0)>parseFloat(byDate[d].avg_rating||0))byDate[d]=doc;});
    shows=Object.values(byDate).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    if(!shows.length){mainEl.innerHTML=`<div class="error-msg">No results for "${q}". Try a venue, city, or year.</div>`;return;}
    renderSearchResults(q);
  }catch{mainEl.innerHTML=`<div class="error-msg">Could not reach archive.org.</div>`;}
}

function renderSearchResults(q){
  const frag=document.createDocumentFragment();
  const lbl=document.createElement("div");lbl.className="section-label";lbl.textContent=`— ${shows.length} results for "${q}" —`;frag.appendChild(lbl);
  const list=document.createElement("div");list.className="show-list";
  shows.forEach((doc,i)=>{
    const parts=(doc.date||"").split("-");
    const day=parts[2]?parseInt(parts[2]):"?";
    const month=parts[1]?MS[parseInt(parts[1])-1]:"";
    const year=parts[0]||"";
    const venue=doc.venue||doc.title||"Unknown Venue";
    const stars=doc.avg_rating?Math.round(parseFloat(doc.avg_rating)):0;
    const releases=getReleases(isoDate(doc.date));
    const src=parseSource(doc.identifier);

    const row=document.createElement("button");row.className="show-row";row.setAttribute("type","button");
    const dateCol=document.createElement("div");dateCol.className="show-date-col";
    dateCol.innerHTML=`<div class="show-day-num">${day}</div><div class="show-month-label">${month}<br><span style="color:var(--amber);font-size:11px">${year}</span></div>`;
    const infoCol=document.createElement("div");infoCol.className="show-info-col";
    const venueEl=document.createElement("div");venueEl.className="show-venue-name";venueEl.textContent=venue;
    const locEl=document.createElement("div");locEl.className="show-location";locEl.textContent=doc.coverage||"";
    const tags=document.createElement("div");tags.className="show-tags";
    if(stars){const t=document.createElement("span");t.className="tag tag-stars";t.textContent="★".repeat(Math.min(5,stars));tags.appendChild(t);}
    if(src==="sbd"){const t=document.createElement("span");t.className="tag tag-sbd";t.textContent="SBD";tags.appendChild(t);}
    releases.forEach(rel=>{const t=document.createElement("span");t.className="tag tag-release";t.textContent=rel.title;tags.appendChild(t);});
    infoCol.appendChild(venueEl);infoCol.appendChild(locEl);if(tags.children.length)infoCol.appendChild(tags);
    const qp=document.createElement("button");qp.className="show-quick-play";qp.setAttribute("type","button");qp.setAttribute("aria-label",`Quick play ${venue}`);qp.textContent="▶";
    qp.addEventListener("click",e=>{e.stopPropagation();quickPlayShow(i);});
    const arrow=document.createElement("div");arrow.className="show-arrow";arrow.textContent="›";
    row.appendChild(dateCol);row.appendChild(infoCol);row.appendChild(qp);row.appendChild(arrow);
    row.addEventListener("click",()=>loadShow(i));
    list.appendChild(row);
  });
  frag.appendChild(list);
  mainEl.innerHTML="";mainEl.appendChild(frag);
}

// ── LOAD SHOW ──
async function loadShow(idx){
  const doc=shows[idx];if(!doc)return;
  activeShow=doc;activeIdentifier=doc.identifier;altRecordings=[];
  mainEl.querySelectorAll(".show-row").forEach((r,i)=>r.classList.toggle("active",i===idx));
  document.getElementById("programHeader")?.remove();
  document.getElementById("setlistBlock")?.remove();
  document.getElementById("recordingSwitcher")?.remove();
  shareBtn.style.display="block";

  // Update URL for deep linking
  const params=new URLSearchParams(window.location.search);
  params.set("show",doc.identifier);
  window.history.replaceState({},"",window.location.pathname+"?"+params.toString());

  renderProgramHeader(doc,null);

  const loading=document.createElement("div");loading.className="msg";loading.id="setlistLoading";loading.textContent="Loading setlist…";mainEl.appendChild(loading);

  try{
    // Fetch metadata + alt recordings in parallel
    const [metaRes, altRes] = await Promise.all([
      fetch("https://archive.org/metadata/"+doc.identifier),
      fetch(`https://archive.org/advancedsearch.php?q=creator%3A%22Grateful+Dead%22+date%3A${isoDate(doc.date)}&fl[]=identifier,title,subject&sort[]=avg_rating+desc&rows=10&page=1&output=json`)
    ]);

    const meta=await metaRes.json();
    const altData=await altRes.json();
    altRecordings=(altData.response?.docs||[]).filter(d=>d.identifier!==doc.identifier).slice(0,5);

    const runtime=calcRuntime(meta.files||[]);
    renderProgramHeader(doc,{meta,runtime});

    // Render recording switcher if alternatives exist
    if(altRecordings.length>0)renderRecordingSwitcher(doc,altRecordings);

    let mp3s=(meta.files||[]).filter(f=>{const n=f.name.toLowerCase();return n.endsWith(".mp3")&&!n.includes("_vbr")&&!n.includes("_sample");});
    if(!mp3s.length)mp3s=(meta.files||[]).filter(f=>f.name.toLowerCase().endsWith(".ogg")&&!f.name.toLowerCase().includes("_vbr"));
    mp3s.sort((a,b)=>trackOrder(a)-trackOrder(b));
    document.getElementById("setlistLoading")?.remove();
    if(!mp3s.length){const e=document.createElement("div");e.className="error-msg";mainEl.appendChild(e);e.textContent="No streamable audio found. Try another recording.";return;}
    tracks=mp3s.map(f=>({name:displayName(f),url:"https://archive.org/download/"+doc.identifier+"/"+encodeURIComponent(f.name),duration:f.length||""}));
    renderSetlist(doc);
    saveRecent(doc);
  }catch{
    document.getElementById("setlistLoading")?.remove();
    const e=document.createElement("div");e.className="error-msg";e.textContent="Could not load show details.";mainEl.appendChild(e);
  }
}

// ── PROGRAM HEADER ──
function renderProgramHeader(doc,extra){
  document.getElementById("programHeader")?.remove();
  const parts=(doc.date||"").split("-");
  const day=parts[2]?parseInt(parts[2]):"?";
  const mi=parts[1]?parseInt(parts[1])-1:0;
  const year=parts[0]||"";
  const venue=doc.venue||doc.title||"Unknown Venue";
  const location=doc.coverage||"";
  const stars=doc.avg_rating?Math.round(parseFloat(doc.avg_rating)):0;
  const releases=getReleases(isoDate(doc.date));
  const src=extra?parseSource(doc.identifier):"";
  const runtime=extra?.runtime||"";
  const description=(doc.description||"").replace(/<[^>]*>/g," ").replace(/\s+/g," ").trim().slice(0,220);
  const reddit=getReddit(isoDate(doc.date));

  const header=document.createElement("div");header.id="programHeader";header.className="program-header";

  // Sticky back button
  const back=document.createElement("button");back.className="program-back";back.setAttribute("aria-label","Back to show list");
  back.innerHTML="← Back";
  back.addEventListener("click",()=>{
    if(currentYear)setBreadcrumb([{label:String(currentYear)}]);
    document.getElementById("programHeader")?.remove();
    document.getElementById("setlistBlock")?.remove();
    document.getElementById("recordingSwitcher")?.remove();
    shareBtn.style.display="none";
    window.history.replaceState({},"",window.location.pathname);
  });
  header.appendChild(back);

  let html=
    `<div class="program-eyebrow">Grateful Dead · Live Recording</div>`+
    `<div class="program-date">${ML[mi]} ${day}, ${year}</div>`+
    `<div class="program-venue">${venue}</div>`+
    `<div class="program-location">${location}</div>`+
    `<div class="program-rule"></div>`+
    `<div class="program-meta-grid">`+
      `<div class="meta-cell"><div class="meta-label">Date</div><div class="meta-value">${ML[mi].slice(0,3)} ${day}, ${year}</div></div>`+
      `<div class="meta-cell"><div class="meta-label">Source</div><div class="meta-value hi">${src?sourceLabel(src):"—"}</div></div>`+
      `<div class="meta-cell"><div class="meta-label">Runtime</div><div class="meta-value">${runtime||"—"}</div></div>`+
      `<div class="meta-cell"><div class="meta-label">Rating</div><div class="meta-value">${stars?"★".repeat(Math.min(5,stars)):"—"}</div></div>`+
      `<div class="meta-cell"><div class="meta-label">Recording</div><div class="meta-value" style="font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${doc.identifier||"—"}</div></div>`+
      `<div class="meta-cell"><div class="meta-label">Archive</div><div class="meta-value"><a href="https://archive.org/details/${doc.identifier||""}" target="_blank" rel="noopener">View →</a></div></div>`+
    `</div>`;

  if(releases.length){
    html+=`<div class="program-releases">`;
    releases.forEach(rel=>{
      html+=`<div class="rel-row">`;
      if(rel.artwork)html+=`<img class="rel-thumb" src="${rel.artwork}" alt="${rel.title}" loading="lazy">`;
      html+=`<div><div class="rel-name">${rel.title}</div><div class="rel-type">${rel.label}</div></div></div>`;
    });
    html+=`</div>`;
  }

  if(description)html+=`<div class="program-description">${description}${description.length>=220?"…":""}</div>`;

  if(reddit&&reddit.mentions>0){
    html+=`<div class="program-reddit"><div class="reddit-count">${reddit.mentions}</div><div class="reddit-label"><span>mentions on</span>r/gratefuldead</div></div>`;
  }

  // Setlist.fm data
  const sl=getSetlist(isoDate(doc.date));
  if(sl&&sl.tour){
    html+=`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--rule);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)">Tour: <span style="color:var(--warm)">${sl.tour}</span></div>`;
  }

  const div=document.createElement("div");div.innerHTML=html;
  while(div.firstChild)header.appendChild(div.firstChild);
  mainEl.appendChild(header);
  header.scrollIntoView({behavior:"smooth",block:"start"});
}

// ── RECORDING SWITCHER ──
function renderRecordingSwitcher(currentDoc,alts){
  document.getElementById("recordingSwitcher")?.remove();
  const wrap=document.createElement("div");wrap.id="recordingSwitcher";wrap.className="recording-switcher";
  const lbl=document.createElement("div");lbl.className="switcher-label";lbl.textContent=`${alts.length+1} recordings of this show`;wrap.appendChild(lbl);
  const list=document.createElement("div");list.className="switcher-list";

  // Current recording first
  const cur=document.createElement("button");cur.className="switcher-item active";cur.setAttribute("type","button");
  const curSrc=parseSource(currentDoc.identifier);
  cur.innerHTML=`<span class="switcher-source ${curSrc}">${curSrc.toUpperCase()}</span>${currentDoc.identifier}`;
  list.appendChild(cur);

  alts.forEach(alt=>{
    const item=document.createElement("button");item.className="switcher-item";item.setAttribute("type","button");
    const altSrc=parseSource(alt.identifier);
    item.innerHTML=`<span class="switcher-source ${altSrc}">${altSrc.toUpperCase()}</span>${alt.identifier}`;
    item.addEventListener("click",async()=>{
      // Switch to this recording
      wrap.querySelectorAll(".switcher-item").forEach(i=>i.classList.remove("active"));
      item.classList.add("active");
      activeIdentifier=alt.identifier;
      document.getElementById("setlistBlock")?.remove();
      const loading=document.createElement("div");loading.className="msg";loading.id="setlistLoading";loading.textContent="Loading recording…";mainEl.appendChild(loading);
      try{
        const r=await fetch("https://archive.org/metadata/"+alt.identifier);
        const meta=await r.json();
        let mp3s=(meta.files||[]).filter(f=>{const n=f.name.toLowerCase();return n.endsWith(".mp3")&&!n.includes("_vbr");});
        mp3s.sort((a,b)=>trackOrder(a)-trackOrder(b));
        document.getElementById("setlistLoading")?.remove();
        tracks=mp3s.map(f=>({name:displayName(f),url:"https://archive.org/download/"+alt.identifier+"/"+encodeURIComponent(f.name),duration:f.length||""}));
        renderSetlist(activeShow);
      }catch{document.getElementById("setlistLoading")?.remove();}
    });
    list.appendChild(item);
  });

  wrap.appendChild(list);
  mainEl.appendChild(wrap);
}

// ── SETLIST ──
function renderSetlist(doc){
  document.getElementById("setlistBlock")?.remove();
  const section=document.createElement("div");section.id="setlistBlock";section.className="setlist-section";
  const showDate=isoDate(doc.date);
  const headyPicks=getHeady(showDate);
  const sl=getSetlist(showDate);

  if(sl&&sl.sets&&sl.sets.length>0){
    // Use setlist.fm data — accurate set breaks and song names
    sl.sets.forEach(set=>{
      const hdr=document.createElement("div");hdr.className="set-header";hdr.textContent=set.label;section.appendChild(hdr);
      set.songs.forEach((song,i)=>{
        // Try to match to audio track by position
        const audioTrack=tracks[section.querySelectorAll(".track-row").length]||null;
        const trackIdx=section.querySelectorAll(".track-row").length;
        const row=document.createElement("button");row.className="track-row";row.setAttribute("type","button");
        const heady=headyPicks.find(h=>{
          const s=h.song.toLowerCase(),t=song.name.toLowerCase();
          return t.includes(s)||s.includes(t)||(s.split(" ")[0].length>3&&t.includes(s.split(" ")[0]));
        });
        const numEl=document.createElement("span");numEl.className="track-num";numEl.textContent=trackIdx+1;
        const bodyEl=document.createElement("div");bodyEl.className="track-body";
        const nameEl=document.createElement("div");nameEl.className="track-name";
        nameEl.innerHTML=song.name+(song.info?` <span style="color:var(--muted);font-size:12px">(${song.info})</span>`:"");
        bodyEl.appendChild(nameEl);
        if(song.cover){const c=document.createElement("div");c.className="track-cover";c.textContent=`Cover: ${song.cover}`;bodyEl.appendChild(c);}
        if(heady){const h=document.createElement("div");h.className="track-heady";h.textContent=`🔥 #${heady.rank} rated · Heady Version`;bodyEl.appendChild(h);}
        const durEl=document.createElement("span");durEl.className="track-dur";durEl.textContent=audioTrack?.duration?fmtTime(parseFloat(audioTrack.duration)):"";
        const playEl=document.createElement("div");playEl.className="track-play";playEl.textContent="▶";
        row.appendChild(numEl);row.appendChild(bodyEl);row.appendChild(durEl);row.appendChild(playEl);
        const ti=trackIdx;row.addEventListener("click",()=>playTrack(ti));
        row.id="tn-"+ti;
        section.appendChild(row);
      });
    });
  } else {
    // Fallback: use archive.org track list with rough set detection
    let curSet=1;
    const addSetHeader=()=>{
      const h=document.createElement("div");h.className="set-header";
      h.textContent=curSet===1?"Set I":curSet===2?"Set II":"Encore";section.appendChild(h);
    };
    addSetHeader();
    tracks.forEach((t,i)=>{
      if(i>0&&i===Math.floor(tracks.length*0.52)&&curSet===1){curSet=2;addSetHeader();}
      const row=document.createElement("button");row.className="track-row";row.setAttribute("type","button");row.id="tn-"+i;
      const heady=headyPicks.find(h=>{
        const s=h.song.toLowerCase(),tl=t.name.toLowerCase();
        return tl.includes(s)||s.includes(tl)||(s.split(" ")[0].length>3&&tl.includes(s.split(" ")[0]));
      });
      const numEl=document.createElement("span");numEl.className="track-num";numEl.textContent=i+1;
      const bodyEl=document.createElement("div");bodyEl.className="track-body";
      const nameEl=document.createElement("div");nameEl.className="track-name";nameEl.textContent=t.name;bodyEl.appendChild(nameEl);
      if(heady){const h=document.createElement("div");h.className="track-heady";h.textContent=`🔥 #${heady.rank} rated · Heady Version`;bodyEl.appendChild(h);}
      const durEl=document.createElement("span");durEl.className="track-dur";durEl.textContent=t.duration?fmtTime(parseFloat(t.duration)):"";
      const playEl=document.createElement("div");playEl.className="track-play";playEl.textContent="▶";
      row.appendChild(numEl);row.appendChild(bodyEl);row.appendChild(durEl);row.appendChild(playEl);
      row.addEventListener("click",()=>playTrack(i));
      section.appendChild(row);
    });
  }
  mainEl.appendChild(section);
}

// ── PLAYBACK ──
function playTrack(idx){
  if(idx<0||idx>=tracks.length)return;
  currentIdx=idx;
  document.querySelectorAll(".track-name").forEach((el,i)=>el.classList.toggle("playing",i===idx));
  audio.src=tracks[idx].url;audio.load();
  audio.play().then(()=>{vizPlaying=true;playBtn.textContent="⏸";playBtn.setAttribute("aria-label","Pause");}).catch(()=>{});
  playerTrack.textContent=tracks[idx].name;
  playerShow.textContent=(activeShow?.venue||activeShow?.title||"")+" · "+(activeShow?.date||"");
  const rel=getReleases(isoDate(activeShow?.date));
  if(rel[0]){playerBadge.textContent=rel[0].title;playerBadge.style.display="block";}
  else playerBadge.style.display="none";
  playerEl.style.display="block";
}

function togglePlay(){
  if(!audio.src)return;
  if(audio.paused){audio.play();vizPlaying=true;playBtn.textContent="⏸";playBtn.setAttribute("aria-label","Pause");}
  else{audio.pause();vizPlaying=false;playBtn.textContent="▶";playBtn.setAttribute("aria-label","Play");}
}

// ── SHARE ──
function shareShow(){
  if(!activeIdentifier)return;
  const url=`${window.location.origin}${window.location.pathname}?show=${activeIdentifier}`;
  navigator.clipboard.writeText(url).then(()=>{
    shareToast.classList.add("show");
    setTimeout(()=>shareToast.classList.remove("show"),2500);
  }).catch(()=>{
    prompt("Copy this link:",url);
  });
}

shareBtn.addEventListener("click",shareShow);

// ── KEYBOARD SHORTCUTS ──
document.getElementById("shortcutsBtn").addEventListener("click",()=>document.getElementById("shortcutsModal").classList.add("visible"));
document.getElementById("modalClose").addEventListener("click",()=>document.getElementById("shortcutsModal").classList.remove("visible"));
document.getElementById("shortcutsModal").addEventListener("click",e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove("visible");});

document.addEventListener("keydown",e=>{
  const tag=(document.activeElement?.tagName||"").toLowerCase();
  if(tag==="input"||tag==="textarea")return;
  if(e.key==="Escape"){document.getElementById("shortcutsModal").classList.remove("visible");return;}
  if(e.key===" "){e.preventDefault();togglePlay();}
  else if(e.key==="n"||e.key==="N"){if(currentIdx<tracks.length-1)playTrack(currentIdx+1);}
  else if(e.key==="p"||e.key==="P"){if(currentIdx>0)playTrack(currentIdx-1);}
  else if(e.key==="ArrowRight"){if(audio.src&&audio.duration)audio.currentTime=Math.min(audio.duration,audio.currentTime+5);}
  else if(e.key==="ArrowLeft"){if(audio.src&&audio.duration)audio.currentTime=Math.max(0,audio.currentTime-5);}
  else if(e.key==="ArrowUp"){audio.volume=Math.min(1,audio.volume+0.1);}
  else if(e.key==="ArrowDown"){audio.volume=Math.max(0,audio.volume-0.1);}
  else if(e.key==="/"){e.preventDefault();document.getElementById("searchInput").focus();}
  else if(e.key==="s"||e.key==="S"){shareShow();}
  else if(e.key==="h"||e.key==="H"){showYearGrid();}
});

// ── AUDIO EVENTS ──
audio.addEventListener("timeupdate",()=>{
  if(audio.duration){
    const pct=audio.currentTime/audio.duration*100;
    progressFill.style.width=pct+"%";
    timeElapsed.textContent=fmtTime(audio.currentTime);
    timeDuration.textContent=fmtTime(audio.duration);
    progressTrack.setAttribute("aria-valuenow",Math.round(pct));
  }
});
audio.addEventListener("ended",()=>{if(currentIdx<tracks.length-1)playTrack(currentIdx+1);else{vizPlaying=false;playBtn.textContent="▶";}});
audio.addEventListener("error",()=>{if(currentIdx<tracks.length-1)setTimeout(()=>playTrack(currentIdx+1),500);});
progressTrack.addEventListener("click",e=>{if(!audio.duration)return;const rect=progressTrack.getBoundingClientRect();audio.currentTime=((e.clientX-rect.left)/rect.width)*audio.duration;});
progressTrack.addEventListener("keydown",e=>{
  if(!audio.duration)return;
  if(e.key==="ArrowRight"||e.key==="ArrowUp"){e.preventDefault();audio.currentTime=Math.min(audio.duration,audio.currentTime+5);}
  if(e.key==="ArrowLeft"||e.key==="ArrowDown"){e.preventDefault();audio.currentTime=Math.max(0,audio.currentTime-5);}
});
playBtn.addEventListener("click",togglePlay);
prevBtn.addEventListener("click",()=>{if(currentIdx>0)playTrack(currentIdx-1);});
nextBtn.addEventListener("click",()=>{if(currentIdx<tracks.length-1)playTrack(currentIdx+1);});
document.getElementById("searchBtn").addEventListener("click",doSearch);
document.getElementById("searchInput").addEventListener("keydown",e=>{if(e.key==="Enter")doSearch();});

// BOOT
async function init(){
  try{
    const r=await fetch("./dead_data.json");
    const data=await r.json();
    Object.assign(RELEASES,data.official_releases||{});
    Object.keys(RELEASES).forEach(d=>REL_YEARS.add(d.slice(0,4)));
    const songs=data.heady_songs||{};
    for(const[name,sd]of Object.entries(songs)){
      (sd.versions||[]).slice(0,5).forEach((v,i)=>{
        const d=v.date;if(!d||d.length!==10)return;
        if(!HEADY[d])HEADY[d]=[];
        HEADY[d].push({song:name,rank:i+1});
      });
    }
    Object.assign(SETLISTS,data.setlists||{});
    Object.assign(REDDIT,data.reddit_mentions||{});
  }catch(e){console.warn("dead_data.json not loaded:",e);}

  const params=new URLSearchParams(window.location.search);
  const showId=params.get("show");
  if(showId){
    loadShowByIdentifier({identifier:showId,venue:"",date:""});
    return;
  }
  renderRecentTray();
  showYearGrid();
}
init();
